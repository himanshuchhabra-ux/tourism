<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism Application Admin Portal</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="login-container">
        <div class="login-wrapper">
            <!-- Left Side - Branding -->
            <div class="login-brand">
                <div class="brand-content">
                    <div class="brand-icon">
                        <i class="fas fa-globe"></i>
                    </div>
                    <h1>Tourism Application</h1>
                    <p>Manage Your Tourism Platform</p>
                    <div class="brand-features">
                        <div class="feature-item">
                            <i class="fas fa-chart-line"></i>
                            <span>Real-time Analytics</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-users"></i>
                            <span>User Management</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-umbrella-beach"></i>
                            <span>Service Control</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="login-form-wrapper">
                <div class="login-form-content">
                    <h2>Admin Login</h2>
                    <p class="form-subtitle">Secure access to your admin panel</p>

                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="email">Email or Username</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="text" 
                                    id="email" 
                                    name="email" 
                                    placeholder="admin@tourhub.com" 
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password" 
                                    placeholder="••••••••" 
                                >
                                <button type="button" class="toggle-password" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" name="remember">
                                <span>Remember me</span>
                            </label>
                            <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                        </div>

                        <!-- Optional 2FA Toggle -->
                        <div class="twofa-toggle-wrapper">
                            <label class="twofa-toggle-label">
                                <div class="twofa-toggle-info">
                                    <i class="fas fa-shield-halved"></i>
                                    <span>Enable Two-Factor Authentication</span>
                                </div>
                                <div class="twofa-switch">
                                    <input type="checkbox" id="twofa-toggle" name="twofa">
                                    <span class="twofa-slider"></span>
                                </div>
                            </label>
                        </div>

                        <a href="javascript:void(0)" class="login-btn" id="loginBtn">
                            <span>Sign In</span>
                            <i class="fas fa-arrow-right"></i>
                        </a>

                        <!-- 2FA Verification Section (hidden by default) -->
                        <div class="twofa-section" id="twofaSection" style="display: none;">
                            <div class="twofa-notice">
                                <i class="fas fa-shield-halved"></i>
                                <span>A 6-digit verification code has been sent to your registered email/device.</span>
                            </div>
                            <label class="twofa-code-label">Enter Verification Code</label>
                            <div class="twofa-code-inputs" id="twofaCodeInputs">
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="0" inputmode="numeric" autocomplete="one-time-code">
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="1" inputmode="numeric">
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="2" inputmode="numeric">
                                <span class="twofa-code-separator">—</span>
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="3" inputmode="numeric">
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="4" inputmode="numeric">
                                <input type="text" maxlength="1" class="twofa-code-box" data-index="5" inputmode="numeric">
                            </div>
                            <button type="button" class="login-btn twofa-verify-btn" id="twofaVerifyBtn">
                                <span>Verify & Continue</span>
                                <i class="fas fa-check-circle"></i>
                            </button>
                            <div class="twofa-actions">
                                <button type="button" class="twofa-resend" id="twofaResendBtn">
                                    <i class="fas fa-rotate-right"></i> Resend Code
                                </button>
                                <button type="button" class="twofa-back" id="twofaBackBtn">
                                    <i class="fas fa-arrow-left"></i> Back to Login
                                </button>
                            </div>
                        </div>
                    </form>

                  
                </div>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
